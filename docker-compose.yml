name: projetofinalweb

# Stack de desenvolvimento: PostgreSQL + pgAdmin + Keycloak
# A API (.NET) usa a mesma instância Postgres (localhost:5433) — veja appsettings.json
#
# Subir: docker compose up -d
# Keycloak:  use sempre http:// (NÃO https) na porta 8080 — admin / admin — realm "desenvweb"
# Utilizador demo: demo / demo123
# pgAdmin:   http://localhost:5050  (admin@admin.com / admin123)

services:
  postgres:
    image: postgres:16-alpine
    container_name: projeto-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: cataneofilmes
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Artefactos na pasta docker/ ao lado deste compose (repositório da API)
      - ./docker/postgres-init.sql:/docker-entrypoint-initdb.d/01-keycloak-db.sql:ro
    networks:
      - app-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cataneofilmes"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: projeto-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-net

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: projeto-keycloak
    command:
      - start-dev
      - --http-port=8080
      - --import-realm
    restart: unless-stopped
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: postgres
      KC_DB_PASSWORD: postgres123
      # Esquema explícito: sem isto o Keycloak pode gerar https em dev e o Chrome dá "invalid response" na :8080.
      KC_HOSTNAME: http://localhost:8080
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KC_HEALTH_ENABLED: "true"
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
    ports:
      - "8080:8080"
    volumes:
      - ./docker/keycloak:/opt/keycloak/data/import:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-net

volumes:
  pgdata:

networks:
  app-net:
    driver: bridge

# Se vir "Page not found" no Keycloak após o login, o realm pode não ter sido importado
# (import só corre bem com BD keycloak vazia ou realm inexistente). Teste no browser:
#   http://localhost:8080/realms/desenvweb/.well-known/openid-configuration  → deve devolver JSON.
# Recriar só a BD keycloak (mantém cataneofilmes) — cuidado, apaga utilizadores Keycloak:
#   docker compose exec postgres psql -U postgres -c "DROP DATABASE IF EXISTS keycloak WITH (FORCE);" -c "CREATE DATABASE keycloak;"
#   docker compose restart keycloak
